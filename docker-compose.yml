services:
  postgres:
    image: postgres:15
    container_name: quant_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quantdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quant_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: quant_mlflow
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://postgres:postgres@postgres:5432/quantdb
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    networks:
      - quant_network

volumes:
  postgres_data:
  mlflow_data:

networks:
  quant_network:
    driver: bridge